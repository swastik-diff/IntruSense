version: '3.9'

services:
  # ── Backend: API + All Honeypots ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intrusense-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      HTTP_HONEYPOT_PORT: 8080
      SSH_HONEYPOT_PORT: 2222
      FTP_HONEYPOT_PORT: 2121
      DEMO_MODE: "true"
      NODE_ENV: production
    ports:
      - "3000:3000"       # API + Socket.io
      - "8080:8080"       # HTTP Honeypot
      - "2222:2222"       # SSH Honeypot
      - "2121:2121"       # FTP Honeypot
    volumes:
      - intrusense-data:/app/data
    networks:
      - intrusense-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend: React Dashboard ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intrusense-frontend
    restart: unless-stopped
    ports:
      - "5173:80"         # Dashboard UI
    networks:
      - intrusense-net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  intrusense-data:
    driver: local

networks:
  intrusense-net:
    driver: bridge
